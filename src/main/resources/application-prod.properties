spring.application.name=sgs-backend

# ── MySQL ──
spring.datasource.url=jdbc:mysql://localhost:3306/sgs_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Server (HTTP interno, Nginx maneja HTTPS) ──
server.port=8080

# ── SSL deshabilitado (Nginx lo maneja) ──
server.ssl.enabled=false

# ── File Upload ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload-dir=/opt/sgs/uploads

# ── JWT ──
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Mail (Gmail SMTP) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Mercado Pago ──
mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.notification-url=${MP_NOTIFICATION_URL}

# ── App ──
app.frontend-url=${FRONTEND_URL:https://sgsmarket.duckdns.org}

# ── CORS ──
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
